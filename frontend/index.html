<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    <title>easyPG</title>
    <link rel="icon" type="image/jpeg" href="https://i.pinimg.com/736x/1d/31/58/1d315807fbdbf074612825fcdaa7c9b8.jpg" />
    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        background-color: #0f172a; /* Premium Dark */
        background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        color: white;
      }
      .logo-pulse {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        margin-bottom: 24px;
        box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
        animation: pulse 2s infinite ease-in-out;
      }
      .loader-bar {
        width: 120px;
        height: 3px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        overflow: hidden;
        position: relative;
      }
      .loader-bar::after {
        content: '';
        position: absolute;
        width: 40%;
        height: 100%;
        background: #6366f1;
        border-radius: 10px;
        animation: loading 1.5s infinite ease-in-out;
      }
      @keyframes pulse {
        0% { transform: scale(0.95); opacity: 0.8; }
        50% { transform: scale(1.05); opacity: 1; }
        100% { transform: scale(0.95); opacity: 0.8; }
      }
      @keyframes loading {
        0% { left: -40%; }
        100% { left: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <img src="https://i.pinimg.com/736x/1d/31/58/1d315807fbdbf074612825fcdaa7c9b8.jpg" class="logo-pulse" alt="Logo" />
        <div class="loader-bar"></div>
        <div style="margin-top: 20px; font-size: 12px; letter-spacing: 0.1em; opacity: 0.5; text-transform: uppercase;">Initializing easyPG</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
